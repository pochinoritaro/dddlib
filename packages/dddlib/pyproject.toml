###############################################################################
# uv 設定
###############################################################################
[project]
name = "dddlib"
version = "0.1.0a1"
description = "ドメイン駆動開発のコアモジュール"
readme = "README.md"
requires-python = ">=3.14"

dependencies = []

[project.optional-dependencies]
cli = [
    "dddlib_cli>=0.1.0a1",
]
all = [
    "dddlib_cli>=0.1.0a1",
]

###############################################################################
# ビルド設定
###############################################################################
[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dddlib"]

[tool.hatch.build.targets.sdist]
include = [
    "src/dddlib",
    "pyproject.toml",
]

###############################################################################
# workspace 参照設定
###############################################################################
[tool.uv.sources]
dddlib_cli = { workspace = true }