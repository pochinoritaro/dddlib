name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - release/**
  push:
    branches:
      - develop
      - release/**

permissions:
  contents: read

jobs:
  test:
    name: lint-type-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: MyPy
        run: uv run mypy --config-file pyproject.toml

      - name: Pytest
        run: uv run pytest
