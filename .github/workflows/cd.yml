name: CD

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "公開先を選択してください"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
      release_ref:
        description: "main 由来のバージョンタグ名を入力してください"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor HEAD origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Build distributions
        run: uv build --project packages/dddlib

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dddlib-distributions
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: publish-testpypi
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dddlib-distributions
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish-pypi
    needs: build
    if: ${{ inputs.publish_target == 'pypi' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dddlib-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
